[phases.setup]
aptPkgs = ["fonts-liberation", "libnss3", "libatk-bridge2.0-0", "libdrm2", "libgbm1", "libxcomposite1", "libxdamage1", "libxrandr2", "libasound2", "libcups2", "libdbus-1-3", "libx11-xcb1", "libxcb1", "libxshmfence1", "libglib2.0-0", "libgconf-2-4", "libatk1.0-0", "libgtk-3-0", "libpango-1.0-0", "libcairo2", "libgdk-pixbuf2.0-0", "libxss1", "libxtst6", "xdg-utils", "wget"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"
