[phases.setup]
aptPkgs = ["fonts-liberation", "libnss3", "libatk-bridge2.0-0", "libdrm2", "libgbm1", "libxcomposite1", "libxdamage1", "libxrandr2", "libasound2", "libcups2", "libdbus-1-3", "libx11-xcb1", "libxcb1", "libxshmfence1"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"
